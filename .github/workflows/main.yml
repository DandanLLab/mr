name: Auto Merge Branches

on:
  push:
    branches:
      - '**'           # 监听所有分支的推送
      - '!main'        # 排除目标分支自身，避免循环

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # 如果是 main 分支的推送，不触发（由上面 branches 已排除，双重保险）
    if: github.ref != 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git identity
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Create or update Pull Request
        id: create-pr
        uses: repo-sync/pull-request@v2
        with:
          source_branch: ${{ github.ref_name }}
          destination_branch: main           # 目标分支，改成你的主分支名
          pr_title: "自动合并 ${{ github.ref_name }}"
          pr_body: "由 GitHub Actions 自动创建的合并请求"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge on PR
        if: steps.create-pr.outputs.pr_number != ''
        run: |
          pr_number=${{ steps.create-pr.outputs.pr_number }}
          gh pr merge $pr_number --auto --merge -R ${{ github.repository }}
          # 参数说明：
          # --auto 启用自动合并
          # --merge 使用 merge commit 方式，也可换 --squash 或 --rebase
          # -R 指定仓库
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
